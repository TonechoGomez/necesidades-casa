<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necesidades de Casa</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: var(--bg-main);
            position: relative;
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 32px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: contain;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            margin: 4px 0 0 0;
            font-size: 0.9rem;
        }

        .view {
            display: none;
        }
        .view.active {
            display: block;
        }

        .list-cajones {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cajon-row {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cajon-row:active {
            background: #1e293bba;
        }

        .cajon-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .cajon-info .icon {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .cajon-info h3 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .count-badge {
            background: var(--border-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .interior-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn-back {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .interior-header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .input-group-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            background: #0f172a;
            color: var(--text-main);
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .btn-add {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .attach-bar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-media {
            background: #0f172a;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-media.recording {
            background: var(--danger);
            color: #ffffff;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .preview-badge {
            font-size: 0.8rem;
            color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lista-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-row {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .item-row.dragging {
            opacity: 0.5;
            background: #334155;
        }

        .drag-handle {
            color: var(--text-muted);
            font-size: 1.2rem;
            padding-right: 10px;
            cursor: grab;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: transparent;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .item-row.tachado .checkbox {
            background: var(--accent);
            border-color: var(--accent);
            color: #0f172a;
        }

        .item-row.tachado .checkbox::after {
            content: "✓";
        }

        .item-content-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .item-text {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .item-row.tachado .item-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .media-icons {
            display: flex;
            gap: 8px;
            font-size: 0.85rem;
        }

        .btn-action-del {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px;
        }

        .btn-action-del:hover {
            color: var(--danger);
        }

        .sub-titulo {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin: 24px 0 12px 0;
        }

        .cargando {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 0.9rem;
        }

        /* Modal / Panel de detalle */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        .btn-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .img-preview-full {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            background: #000;
            cursor: zoom-in;
        }

        audio {
            width: 100%;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .btn-save {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Modal para la foto ampliada a pantalla completa */
        .modal-zoom {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .modal-zoom.active {
            display: flex;
        }

        .modal-zoom img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    
    <div id="vista-inicio" class="view active">
        <header>
            <img class="app-logo" src="Espiral.jpg" alt="Logo Espiral">
            <h1>NECESIDADES DE CASA</h1>
            <p>Sistema centralizado de reposición</p>
        </header>

        <div class="list-cajones" id="menu-cajones">
            <div class="cargando">Conectando al servidor...</div>
        </div>
    </div>

    <div id="vista-cajon" class="view">
        <div class="interior-header">
            <button class="btn-back" onclick="irInicio()">←</button>
            <h2 id="titulo-cajon">Categoría</h2>
        </div>

        <div class="input-group-container">
            <div class="input-group">
                <input type="text" id="input-articulo" placeholder="Añadir elemento a la lista...">
                <button class="btn-add" onclick="agregarArticulo()">+</button>
            </div>
            <div class="attach-bar">
                <input type="file" id="input-foto" accept="image/*" style="display:none" onchange="procesarFotoSeleccionada(event)">
                <button class="btn-media" onclick="document.getElementById('input-foto').click()">📷 Foto</button>
                <button class="btn-media" id="btn-record" onclick="toggleGrabarAudio()">🎙️ Audio</button>
                <div id="preview-adjuntos"></div>
            </div>
        </div>

        <ul id="lista-articulos" class="lista-items"></ul>
    </div>

    <div id="vista-seccion-coches" class="view">
        <div class="interior-header">
            <button class="btn-back" onclick="irInicio()">←</button>
            <h2>Gestión de Vehículos</h2>
        </div>

        <div class="input-group" style="margin-bottom: 20px;">
            <input type="text" id="input-nuevo-coche" placeholder="Ej. Ford Focus, Moto...">
            <button class="btn-add" onclick="crearCoche()">+</button>
        </div>

        <div class="sub-titulo">Selecciona un vehículo para ver su lista:</div>
        <div class="list-cajones" id="lista-botones-coches" style="margin-bottom: 24px;"></div>

        <div class="sub-titulo">Eliminar vehículos existentes:</div>
        <ul id="lista-eliminar-coches" class="lista-items"></ul>
    </div>

</div>

<!-- Modal Detalle y Modificación -->
<div id="modal-detalle" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Editar / Ver Elemento</h3>
            <button class="btn-close" onclick="cerrarModal()">✕</button>
        </div>
        <label style="font-size:0.85rem; color:var(--text-muted)">Nombre o descripción:</label>
        <input type="text" id="edit-texto">
        
        <div id="modal-seccion-foto" style="display:none; flex-direction:column; gap:8px;">
            <label style="font-size:0.85rem; color:var(--text-muted)">Fotografía adjunta (Toca para ampliar):</label>
            <img id="modal-img" class="img-preview-full" src="" alt="Foto adjunta" onclick="ampliarImagenModal()">
            <button class="btn-action-del" style="color:var(--danger); text-align:left;" onclick="eliminarFotoModal()">🗑️ Quitar Foto</button>
        </div>

        <div id="modal-seccion-audio" style="display:none; flex-direction:column; gap:8px;">
            <label style="font-size:0.85rem; color:var(--text-muted)">Nota de voz:</label>
            <audio id="modal-audio" controls></audio>
            <button class="btn-action-del" style="color:var(--danger); text-align:left;" onclick="eliminarAudioModal()">🗑️ Quitar Audio</button>
        </div>

        <div style="border-top: 1px solid var(--border-color); padding-top: 12px; margin-top: 4px;">
            <label style="font-size:0.85rem; color:var(--text-muted)">Añadir/Cambiar foto o audio:</label>
            <div class="attach-bar" style="margin-top: 8px;">
                <input type="file" id="modal-input-foto" accept="image/*" style="display:none" onchange="cambiarFotoModal(event)">
                <button class="btn-media" onclick="document.getElementById('modal-input-foto').click()">📷 Cambiar Foto</button>
                <button class="btn-media" id="modal-btn-record" onclick="toggleGrabarAudioModal()">🎙️ Grabar Audio</button>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-save" onclick="guardarCambiosModal()">Guardar Cambios</button>
        </div>
    </div>
</div>

<!-- Modal para ver Foto Ampliada -->
<div id="modal-zoom" class="modal-zoom" onclick="cerrarImagenAmpliada()">
    <img id="img-ampliada" src="" alt="Foto Ampliada">
</div>

<script>
    // Enlace a tu nueva base de datos y contraseña asociada
    const URL_NUBE = "https://api.jsonbin.io/v3/b/6a55dfeef5f4af5e298c34e8";
    const API_KEY = "$2a$10$At3bV4wIYKE.DIBtiz1y2uEvkfyxpfuKC7BnNRqw3HOjhgcHaz6cC";

    let coches = [];
    let datosApp = { super: {}, casa: {}, accesorios: {}, finca: {} };
    let cajonActivo = '';
    
    // Semáforos para evitar colisiones de red
    let estaGuardando = false; 
    let estaCargando = false;

    // Variables para adjuntos temporales (al crear)
    let tempFotoBase64 = null;
    let tempAudioBase64 = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    // Variables para modal / edición activa
    let itemEditandoKey = null;
    let modalFotoBase64 = null;
    let modalAudioBase64 = null;
    let modalMediaRecorder = null;
    let modalAudioChunks = [];
    let modalIsRecording = false;

    const apartadosFijos = [
        { id: 'super', nombre: 'Supermercado', icono: '🍏' },
        { id: 'casa', nombre: 'Cosas de Casa', icono: '🏠' },
        { id: 'accesorios', nombre: 'Accesorios', icono: '🎒' },
        { id: 'finca', nombre: 'La Finca', icono: '🏡' }
    ];

    async function cargarDatosNube() {
        if (estaGuardando || estaCargando) return; 
        
        estaCargando = true;
        try {
            const res = await fetch(URL_NUBE, {
                headers: { "X-Master-Key": API_KEY }
            });
            
            if (!res.ok) {
                throw new Error("Respuesta de red incorrecta: " + res.status);
            }

            const resultado = await res.json();
            const data = resultado.record || {};

            if (!estaGuardando) {
                coches = data.listaCoches || [];
                datosApp.super = data.super || {};
                datosApp.casa = data.casa || {};
                datosApp.accesorios = data.accesorios || {};
                datosApp.finca = data.finca || {};

                coches.forEach(c => {
                    datosApp[c] = data[c] || {};
                });

                limpiarTachadosAntiguos();
                refrescarPantallaActual();
            }
        } catch (e) {
            console.error("Error al cargar de la nube:", e);
        } finally {
            estaCargando = false;
        }
    }

    async function guardarDatosNube() {
        estaGuardando = true; 
        const estructuraAGuardar = {
            listaCoches: coches,
            super: datosApp.super,
            casa: datosApp.casa,
            accesorios: datosApp.accesorios,
            finca: datosApp.finca
        };
        coches.forEach(c => {
            estructuraAGuardar[c] = datosApp[c] || {};
        });

        try {
            const res = await fetch(URL_NUBE, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify(estructuraAGuardar)
            });
            if (!res.ok) {
                throw new Error("Fallo en el servidor al guardar: " + res.status);
            }
        } catch (e) {
            console.error("Error al guardar en la nube:", e);
        } finally {
            estaGuardando = false; 
        }
    }

    // Regla de 7 días exactos para conservar elementos tachados
    function limpiarTachadosAntiguos() {
        const ahora = Date.now();
        const sieteDiasMs = 7 * 24 * 60 * 60 * 1000;

        Object.keys(datosApp).forEach(cajon => {
            Object.keys(datosApp[cajon]).forEach(key => {
                const item = datosApp[cajon][key];
                if (item.tachado && item.timestampTachado) {
                    if (ahora - item.timestampTachado > sieteDiasMs) {
                        delete datosApp[cajon][key];
                    }
                }
            });
        });
    }

    function refrescarPantallaActual() {
        if (document.getElementById('vista-inicio').classList.contains('active')) {
            renderizarMenuInicio();
        } else if (document.getElementById('vista-cajon').classList.contains('active')) {
            renderizarArticulosLista();
        } else if (document.getElementById('vista-seccion-coches').classList.contains('active')) {
            renderizarPanelesCoches();
        }
    }

    function renderizarMenuInicio() {
        const menu = document.getElementById('menu-cajones');
        menu.innerHTML = '';

        apartadosFijos.forEach(a => {
            const items = datosApp[a.id] || {};
            const pendientes = Object.values(items).filter(i => !i.tachado).length;
            
            menu.innerHTML += `
                <div class="cajon-row" onclick="abrirCajon('${a.id}', '${a.nombre}', '${a.icono}')">
                    <div class="cajon-info">
                        <span class="icon">${a.icono}</span>
                        <h3>${a.nombre}</h3>
                    </div>
                    <span class="count-badge">${pendientes} u.</span>
                </div>
            `;
        });

        let totalCochesPendientes = 0;
        coches.forEach(c => {
            const items = datosApp[c] || {};
            totalCochesPendientes += Object.values(items).filter(i => !i.tachado).length;
        });

        menu.innerHTML += `
            <div class="cajon-row" onclick="abrirSeccionCoches()" style="border-color: var(--primary);">
                <div class="cajon-info">
                    <span class="icon">🚗</span>
                    <h3>Vehículos y Coches</h3>
                </div>
                <span class="count-badge" style="background: rgba(56, 189, 248, 0.2); color: var(--primary);">${totalCochesPendientes} u.</span>
            </div>
        `;
    }

    function abrirCajon(id, nombre, icono) {
        cajonActivo = id;
        document.getElementById('titulo-cajon').innerText = `${icono} ${nombre}`;
        document.getElementById('vista-inicio').classList.remove('active');
        document.getElementById('vista-seccion-coches').classList.remove('active');
        document.getElementById('vista-cajon').classList.add('active');
        limpiarAdjuntosInput();
        renderizarArticulosLista();
    }

    function renderizarArticulosLista() {
        const lista = document.getElementById('lista-articulos');
        lista.innerHTML = '';
        const items = datosApp[cajonActivo] || {};

        Object.keys(items).forEach((key, index) => {
            const item = items[key];
            const claseTachado = item.tachado ? 'tachado' : '';
            
            const li = document.createElement('li');
            li.className = `item-row ${claseTachado}`;
            li.draggable = true;
            li.dataset.key = key;

            // Badges para foto y audio
            let mediaHtml = '';
            if (item.foto) mediaHtml += `<span>📷</span>`;
            if (item.audio) mediaHtml += `<span>🎙️</span>`;

            li.innerHTML = `
                <div class="drag-handle">⋮⋮</div>
                <div class="item-left">
                    <div class="checkbox" onclick="event.stopPropagation(); alternarTachar('${key}', ${item.tachado})"></div>
                    <div class="item-content-box" onclick="abrirModalDetalle('${key}')">
                        <span class="item-text">${item.texto}</span>
                        ${mediaHtml ? `<div class="media-icons">${mediaHtml}</div>` : ''}
                    </div>
                </div>
                <button class="btn-action-del">Eliminar</button>
            `;
            
            li.querySelector('.btn-action-del').onclick = (e) => {
                e.stopPropagation();
                eliminarArticulo(key);
            };

            // Eventos de arrastrar y reordenar
            li.addEventListener('dragstart', handleDragStart);
            li.addEventListener('dragover', handleDragOver);
            li.addEventListener('drop', handleDrop);
            li.addEventListener('dragend', handleDragEnd);

            lista.appendChild(li);
        });
    }

    // Funciones de reordenación por arrastre
    let dragSrcKey = null;

    function handleDragStart(e) {
        dragSrcKey = this.dataset.key;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
        if (e.preventDefault) e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        return false;
    }

    async function handleDrop(e) {
        if (e.stopPropagation) e.stopPropagation();
        const targetKey = this.dataset.key;
        
        if (dragSrcKey && targetKey && dragSrcKey !== targetKey) {
            const items = datosApp[cajonActivo] || {};
            const keys = Object.keys(items);
            const fromIndex = keys.indexOf(dragSrcKey);
            const toIndex = keys.indexOf(targetKey);

            if (fromIndex !== -1 && toIndex !== -1) {
                const reordered = {};
                keys.splice(fromIndex, 1);
                keys.splice(toIndex, 0, dragSrcKey);

                keys.forEach(k => {
                    reordered[k] = items[k];
                });

                datosApp[cajonActivo] = reordered;
                renderizarArticulosLista();
                await guardarDatosNube();
            }
        }
        return false;
    }

    function handleDragEnd() {
        this.classList.remove('dragging');
    }

    // Procesamiento de adjuntos (Foto y Grabación)
    function procesarFotoSeleccionada(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600;
                let scale = MAX_WIDTH / img.width;
                if (scale > 1) scale = 1;
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                tempFotoBase64 = canvas.toDataURL('image/jpeg', 0.6);
                actualizarPreviewAdjuntos();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function toggleGrabarAudio() {
        const btn = document.getElementById('btn-record');
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        tempAudioBase64 = reader.result;
                        actualizarPreviewAdjuntos();
                    };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('recording');
                btn.innerText = '🔴 Grabando...';
            } catch (err) {
                alert('No se pudo acceder al micrófono');
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btn.classList.remove('recording');
            btn.innerText = '🎙️ Audio';
        }
    }

    function actualizarPreviewAdjuntos() {
        const container = document.getElementById('preview-adjuntos');
        container.innerHTML = '';
        if (tempFotoBase64) container.innerHTML += `<span class="preview-badge">📷 Foto ok</span>`;
        if (tempAudioBase64) container.innerHTML += `<span class="preview-badge">🎙️ Audio ok</span>`;
    }

    function limpiarAdjuntosInput() {
        tempFotoBase64 = null;
        tempAudioBase64 = null;
        document.getElementById('input-foto').value = '';
        actualizarPreviewAdjuntos();
    }

    async function agregarArticulo() {
        const input = document.getElementById('input-articulo');
        const texto = input.value.trim();
        if (texto === '' && !tempFotoBase64 && !tempAudioBase64) return;

        const idUnico = "item_" + Date.now();
        if (!datosApp[cajonActivo]) datosApp[cajonActivo] = {};
        
        datosApp[cajonActivo][idUnico] = {
            texto: texto || 'Elemento con adjunto',
            tachado: false,
            timestampTachado: null,
            foto: tempFotoBase64,
            audio: tempAudioBase64
        };

        input.value = '';
        limpiarAdjuntosInput();
        renderizarArticulosLista();
        
        await guardarDatosNube();
        refrescarPantallaActual();
    }

    async function alternarTachar(key, estadoActual) {
        const nuevoEstado = !estadoActual;
        datosApp[cajonActivo][key].tachado = nuevoEstado;
        datosApp[cajonActivo][key].timestampTachado = nuevoEstado ? Date.now() : null;
        
        renderizarArticulosLista();
        
        await guardarDatosNube();
        refrescarPantallaActual();
    }

    async function eliminarArticulo(key) {
        delete datosApp[cajonActivo][key];
        renderizarArticulosLista();
        
        await guardarDatosNube();
        refrescarPantallaActual();
    }

    // Modal para Ver / Editar
    function abrirModalDetalle(key) {
        itemEditandoKey = key;
        const item = datosApp[cajonActivo][key];
        if (!item) return;

        document.getElementById('edit-texto').value = item.texto || '';

        modalFotoBase64 = item.foto || null;
        modalAudioBase64 = item.audio || null;

        const secFoto = document.getElementById('modal-seccion-foto');
        const imgEl = document.getElementById('modal-img');
        if (modalFotoBase64) {
            imgEl.src = modalFotoBase64;
            secFoto.style.display = 'flex';
        } else {
            secFoto.style.display = 'none';
        }

        const secAudio = document.getElementById('modal-seccion-audio');
        const audioEl = document.getElementById('modal-audio');
        if (modalAudioBase64) {
            audioEl.src = modalAudioBase64;
            secAudio.style.display = 'flex';
        } else {
            secAudio.style.display = 'none';
        }

        document.getElementById('modal-detalle').classList.add('active');
    }

    function cerrarModal() {
        document.getElementById('modal-detalle').classList.remove('active');
        itemEditandoKey = null;
    }

    function ampliarImagenModal() {
        if (!modalFotoBase64) return;
        document.getElementById('img-ampliada').src = modalFotoBase64;
        document.getElementById('modal-zoom').classList.add('active');
    }

    function cerrarImagenAmpliada() {
        document.getElementById('modal-zoom').classList.remove('active');
    }

    function eliminarFotoModal() {
        modalFotoBase64 = null;
        document.getElementById('modal-seccion-foto').style.display = 'none';
    }

    function eliminarAudioModal() {
        modalAudioBase64 = null;
        document.getElementById('modal-seccion-audio').style.display = 'none';
    }

    function cambiarFotoModal(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600;
                let scale = MAX_WIDTH / img.width;
                if (scale > 1) scale = 1;
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                modalFotoBase64 = canvas.toDataURL('image/jpeg', 0.6);
                
                document.getElementById('modal-img').src = modalFotoBase64;
                document.getElementById('modal-seccion-foto').style.display = 'flex';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function toggleGrabarAudioModal() {
        const btn = document.getElementById('modal-btn-record');
        if (!modalIsRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                modalMediaRecorder = new MediaRecorder(stream);
                modalAudioChunks = [];

                modalMediaRecorder.ondataavailable = e => modalAudioChunks.push(e.data);
                modalMediaRecorder.onstop = () => {
                    const audioBlob = new Blob(modalAudioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        modalAudioBase64 = reader.result;
                        document.getElementById('modal-audio').src = modalAudioBase64;
                        document.getElementById('modal-seccion-audio').style.display = 'flex';
                    };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };

                modalMediaRecorder.start();
                modalIsRecording = true;
                btn.classList.add('recording');
                btn.innerText = '🔴 Grabando...';
            } catch (err) {
                alert('No se pudo acceder al micrófono');
            }
        } else {
            modalMediaRecorder.stop();
            modalIsRecording = false;
            btn.classList.remove('recording');
            btn.innerText = '🎙️ Audio';
        }
    }

    async function guardarCambiosModal() {
        if (!itemEditandoKey || !datosApp[cajonActivo][itemEditandoKey]) return;

        const nuevoTexto = document.getElementById('edit-texto').value.trim();
        datosApp[cajonActivo][itemEditandoKey].texto = nuevoTexto || 'Elemento con adjunto';
        datosApp[cajonActivo][itemEditandoKey].foto = modalFotoBase64;
        datosApp[cajonActivo][itemEditandoKey].audio = modalAudioBase64;

        cerrarModal();
        renderizarArticulosLista();
        await guardarDatosNube();
        refrescarPantallaActual();
    }

    // Gestión de coches
    function abrirSeccionCoches() {
        document.getElementById('vista-inicio').classList.remove('active');
        document.getElementById('vista-seccion-coches').classList.add('active');
        renderizarPanelesCoches();
    }

    function renderizarPanelesCoches() {
        const contenedorBotones = document.getElementById('lista-botones-coches');
        const listaEliminar = document.getElementById('lista-eliminar-coches');
        
        contenedorBotones.innerHTML = '';
        listaEliminar.innerHTML = '';

        if (coches.length === 0) {
            contenedorBotones.innerHTML = `<div style="color: var(--text-muted); font-size: 0.9rem; padding: 10px 5px;">No hay coches añadidos.</div>`;
        }

        coches.forEach(c => {
            const items = datosApp[c] || {};
            const pendientes = Object.values(items).filter(i => !i.tachado).length;
            
            contenedorBotones.innerHTML += `
                <div class="cajon-row" onclick="abrirCajon('${c}', 'Coche: ${c}', '🚗')">
                    <div class="cajon-info">
                        <span class="icon">🔹</span>
                        <h3>${c}</h3>
                    </div>
                    <span class="count-badge">${pendientes} u.</span>
                </div>
            `;

            const liDel = document.createElement('li');
            liDel.className = 'item-row';
            liDel.style.padding = '10px 16px';
            liDel.innerHTML = `
                <span class="item-text" style="color: var(--text-muted); font-size: 0.9rem;">🚗 ${c}</span>
                <button class="btn-action-del" style="color: var(--danger);">Borrar Vehículo</button>
            `;
            liDel.querySelector('.btn-action-del').onclick = () => borrarCoche(c);
            listaEliminar.appendChild(liDel);
        });
    }

    async function crearCoche() {
        const input = document.getElementById('input-nuevo-coche');
        const nombre = input.value.trim();
        if (nombre === '' || coches.includes(nombre)) return;

        coches.push(nombre);
        datosApp[nombre] = {};
        input.value = '';
        renderizarPanelesCoches();
        await guardarDatosNube();
        refrescarPantallaActual();
    }

    async function borrarCoche(nombre) {
        coches = coches.filter(c => c !== nombre);
        delete datosApp[nombre];
        renderizarPanelesCoches();
        await guardarDatosNube();
        refrescarPantallaActual();
    }

    function irInicio() {
        document.getElementById('vista-cajon').classList.remove('active');
        document.getElementById('vista-seccion-coches').classList.remove('active');
        document.getElementById('vista-inicio').classList.add('active');
        renderizarMenuInicio();
    }

    // Sincronización en segundo plano protegida cada 5 segundos
    setInterval(cargarDatosNube, 5000);
    cargarDatosNube();
</script>
