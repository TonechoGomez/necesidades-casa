<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necesidades de Casa</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: var(--bg-main);
            position: relative;
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 32px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: contain;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            margin: 4px 0 0 0;
            font-size: 0.9rem;
        }

        .view {
            display: none;
        }
        .view.active {
            display: block;
        }

        .list-cajones {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cajon-row {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cajon-row:active {
            background: #1e293bba;
        }

        .cajon-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .cajon-info .icon {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .cajon-info h3 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .count-badge {
            background: var(--border-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .interior-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn-back {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .interior-header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            background: #0f172a;
            color: var(--text-main);
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .btn-add {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .lista-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-row {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: transparent;
            transition: all 0.2s;
        }

        .item-row.tachado .checkbox {
            background: var(--accent);
            border-color: var(--accent);
            color: #0f172a;
        }

        .item-row.tachado .checkbox::after {
            content: "✓";
        }

        .item-text {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .item-row.tachado .item-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .btn-action-del {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px;
        }

        .btn-action-del:hover {
            color: var(--danger);
        }

        .sub-titulo {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin: 24px 0 12px 0;
        }

        .cargando {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="phone-container">
    
    <!-- ================= PANTALLA INICIAL ================= -->
    <div id="vista-inicio" class="view active">
        <header>
            <img class="app-logo" src="Espiral.jpg" alt="Logo Espiral">
            <h1>NECESIDADES DE CASA</h1>
            <p>Sistema centralizado de reposición</p>
        </header>

        <div class="list-cajones" id="menu-cajones">
            <div class="cargando">Conectando al servidor...</div>
        </div>
    </div>

    <!-- ================= PANTALLA INTERIOR DE UNA LISTA ================= -->
    <div id="vista-cajon" class="view">
        <div class="interior-header">
            <button class="btn-back" onclick="irInicio()">←</button>
            <h2 id="titulo-cajon">Categoría</h2>
        </div>

        <div class="input-group">
            <input type="text" id="input-articulo" placeholder="Añadir elemento a la lista...">
            <button class="btn-add" onclick="agregarArticulo()">+</button>
        </div>

        <ul id="lista-articulos" class="lista-items"></ul>
    </div>

    <!-- ================= PANTALLA CENTRAL DE COCHES ================= -->
    <div id="vista-seccion-coches" class="view">
        <div class="interior-header">
            <button class="btn-back" onclick="irInicio()">←</button>
            <h2>Gestión de Vehículos</h2>
        </div>

        <div class="input-group">
            <input type="text" id="input-nuevo-coche" placeholder="Ej. Ford Focus, Moto...">
            <button class="btn-add" onclick="crearCoche()">+</button>
        </div>

        <div class="sub-titulo">Selecciona un vehículo para ver su lista:</div>
        <div class="list-cajones" id="lista-botones-coches" style="margin-bottom: 24px;"></div>

        <div class="sub-titulo">Eliminar vehículos existentes:</div>
        <ul id="lista-eliminar-coches" class="lista-items"></ul>
    </div>

</div>

<script>
    const URL_NUBE = "https://api.jsonbin.io/v3/b/669255bead19ca34f8876c4a";
    const API_KEY = "$2a$10$W2iE6Z8I49m9A8E8H7bYI.H3F/KjE6D7Wd0qO3XfE8eZ8p2l8yG1i";

    let coches = [];
    let datosApp = { super: {}, casa: {}, accesorios: {}, finca: {} };
    let cajonActivo = '';
    let estaGuardando = false; // El semáforo para evitar que se borren los datos al escribir

    const apartadosFijos = [
        { id: 'super', nombre: 'Supermercado', icono: '🍏' },
        { id: 'casa', nombre: 'Cosas de Casa', icono: '🏠' },
        { id: 'accesorios', nombre: 'Accesorios', icono: '🎒' },
        { id: 'finca', nombre: 'La Finca', icono: '🏡' }
    ];

    async function cargarDatosNube() {
        if (estaGuardando) return; // Si estamos guardando algo, ignoramos la sincronización externa transitoria
        try {
            const res = await fetch(URL_NUBE, {
                headers: { "X-Master-Key": API_KEY }
            });
            const resultado = await res.json();
            const data = resultado.record || {};

            coches = data.listaCoches || [];
            datosApp.super = data.super || {};
            datosApp.casa = data.casa || {};
            datosApp.accesorios = data.accesorios || {};
            datosApp.finca = data.finca || {};

            coches.forEach(c => {
                datosApp[c] = data[c] || {};
            });

            limpiarTachadosAntiguos();
            refrescarPantallaActual();
        } catch (e) {
            console.error("Error al cargar", e);
        }
    }

    async function guardarDatosNube() {
        estaGuardando = true; // Activamos el semáforo de bloqueo
        const estructuraAGuardar = {
            listaCoches: coches,
            super: datosApp.super,
            casa: datosApp.casa,
            accesorios: datosApp.accesorios,
            finca: datosApp.finca
        };
        coches.forEach(c => {
            estructuraAGuardar[c] = datosApp[c] || {};
        });

        try {
            await fetch(URL_NUBE, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify(estructuraAGuardar)
            });
        } catch (e) {
            console.error("Error al guardar", e);
        } finally {
            estaGuardando = false; // Liberamos el semáforo al terminar de guardar con éxito
        }
    }

    function limpiarTachadosAntiguos() {
        const hoyStr = new Date().toDateString();
        Object.keys(datosApp).forEach(cajon => {
            Object.keys(datosApp[cajon]).forEach(key => {
                const item = datosApp[cajon][key];
                if (item.tachado && item.fechaTachado !== hoyStr) {
                    delete datosApp[cajon][key];
                }
            });
        });
    }

    function refrescarPantallaActual() {
        if (document.getElementById('vista-inicio').classList.contains('active')) {
            renderizarMenuInicio();
        } else if (document.getElementById('vista-cajon').classList.contains('active')) {
            renderizarArticulosLista();
        } else if (document.getElementById('vista-seccion-coches').classList.contains('active')) {
            renderizarPanelesCoches();
        }
    }

    function renderizarMenuInicio() {
        const menu = document.getElementById('menu-cajones');
        menu.innerHTML = '';

        apartadosFijos.forEach(a => {
            const items = datosApp[a.id] || {};
            const pendientes = Object.values(items).filter(i => !i.tachado).length;
            
            menu.innerHTML += `
                <div class="cajon-row" onclick="abrirCajon('${a.id}', '${a.nombre}', '${a.icono}')">
                    <div class="cajon-info">
                        <span class="icon">${a.icono}</span>
                        <h3>${a.nombre}</h3>
                    </div>
                    <span class="count-badge">${pendientes} u.</span>
                </div>
            `;
        });

        let totalCochesPendientes = 0;
        coches.forEach(c => {
            const items = datosApp[c] || {};
            totalCochesPendientes += Object.values(items).filter(i => !i.tachado).length;
        });

        menu.innerHTML += `
            <div class="cajon-row" onclick="abrirSeccionCoches()" style="border-color: var(--primary);">
                <div class="cajon-info">
                    <span class="icon">🚗</span>
                    <h3>Vehículos y Coches</h3>
                </div>
                <span class="count-badge" style="background: rgba(56, 189, 248, 0.2); color: var(--primary);">${totalCochesPendientes} u.</span>
            </div>
        `;
    }

    function abrirCajon(id, nombre, icono) {
        cajonActivo = id;
        document.getElementById('titulo-cajon').innerText = `${icono} ${nombre}`;
        document.getElementById('vista-inicio').classList.remove('active');
        document.getElementById('vista-seccion-coches').classList.remove('active');
        document.getElementById('vista-cajon').classList.add('active');
        renderizarArticulosLista();
    }

    function renderizarArticulosLista() {
        const lista = document.getElementById('lista-articulos');
        lista.innerHTML = '';
        const items = datosApp[cajonActivo] || {};

        Object.keys(items).forEach(key => {
            const item = items[key];
            const claseTachado = item.tachado ? 'tachado' : '';
            
            const li = document.createElement('li');
            li.className = `item-row ${claseTachado}`;
            li.onclick = () => alternarTachar(key, item.texto, item.tachado);
            li.innerHTML = `
                <div class="item-left">
                    <div class="checkbox"></div>
                    <span class="item-text">${item.texto}</span>
                </div>
                <button class="btn-action-del">Eliminar</button>
            `;
            
            li.querySelector('.btn-action-del').onclick = (e) => {
                e.stopPropagation();
                eliminarArticulo(key);
            };
            
            lista.appendChild(li);
        });
    }

    async function agregarArticulo() {
        const input = document.getElementById('input-articulo');
        const texto = input.value.trim();
        if (texto === '') return;

        const idUnico = "item_" + Date.now();
        if (!datosApp[cajonActivo]) datosApp[cajonActivo] = {};
        
        datosApp[cajonActivo][idUnico] = {
            texto: texto,
            tachado: false,
            fechaTachado: null
        };

        input.value = '';
        renderizarArticulosLista();
        
        // Bloquea, guarda en la nube y asienta el cambio
        await guardarDatosNube();
    }

    async function alternarTachar(key, texto, estadoActual) {
        const nuevoEstado = !estadoActual;
        datosApp[cajonActivo][key].tachado = nuevoEstado;
        datosApp[cajonActivo][key].fechaTachado = nuevoEstado ? new Date().toDateString() : null;
        
        renderizarArticulosLista();
        
        // Bloquea y guarda el cambio de tachado de inmediato
        await guardarDatosNube();
    }

    async function eliminarArticulo(key) {
        delete datosApp[cajonActivo][key];
        renderizarArticulosLista();
        
        // Bloquea y guarda la eliminación de inmediato
        await guardarDatosNube();
    }

    function abrirSeccionCoches() {
        document.getElementById('vista-inicio').classList.remove('active');
        document.getElementById('vista-seccion-coches').classList.add('active');
        renderizarPanelesCoches();
    }

    function renderizarPanelesCoches() {
        const contenedorBotones = document.getElementById('lista-botones-coches');
        const listaEliminar = document.getElementById('lista-eliminar-coches');
        
        contenedorBotones.innerHTML = '';
        listaEliminar.innerHTML = '';

        if (coches.length === 0) {
            contenedorBotones.innerHTML = `<div style="color: var(--text-muted); font-size: 0.9rem; padding: 10px 5px;">No hay coches añadidos.</div>`;
        }

        coches.forEach(c => {
            const items = datosApp[c] || {};
            const pendientes = Object.values(items).filter(i => !i.tachado).length;
            
            contenedorBotones.innerHTML += `
                <div class="cajon-row" onclick="abrirCajon('${c}', 'Coche: ${c}', '🚗')">
                    <div class="cajon-info">
                        <span class="icon">🔹</span>
                        <h3>${c}</h3>
                    </div>
                    <span class="count-badge">${pendientes} u.</span>
                </div>
            `;

            const liDel = document.createElement('li');
            liDel.className = 'item-row';
            liDel.style.padding = '10px 16px';
            liDel.innerHTML = `
                <span class="item-text" style="color: var(--text-muted); font-size: 0.9rem;">🚗 ${c}</span>
                <button class="btn-action-del" style="color: var(--danger);">Borrar Vehículo</button>
            `;
            liDel.querySelector('.btn-action-del').onclick = () => borrarCoche(c);
            listaEliminar.appendChild(liDel);
        });
    }

    async function crearCoche() {
        const input = document.getElementById('input-nuevo-coche');
        const nombre = input.value.trim();
        if (nombre === '' || coches.includes(nombre)) return;

        coches.push(nombre);
        datosApp[nombre] = {};
        input.value = '';
        renderizarPanelesCoches();
        await guardarDatosNube();
    }

    async function borrarCoche(nombre) {
        coches = coches.filter(c => c !== nombre);
        delete datosApp[nombre];
        renderizarPanelesCoches();
        await guardarDatosNube();
    }

    function irInicio() {
        document.getElementById('vista-cajon').classList.remove('active');
        document.getElementById('vista-seccion-coches').classList.remove('active');
        document.getElementById('vista-inicio').classList.add('active');
        renderizarMenuInicio();
    }

    // Sincronización inteligente protegida cada 5 segundos
    setInterval(cargarDatosNube, 5000);
    cargarDatosNube();
</script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Instalación de app lista"))
            .catch(err => console.error("Error", err));
    }
</script>

</body>
</html>
